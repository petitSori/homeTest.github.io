<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta http-equiv="X-UA-Comaptible" content="IE=edge, chrome=1">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>메이트 체험하기_프로모션</title>

<link rel="stylesheet" href="./css/default.css" />
<link rel="stylesheet" href="./css/result.css" />

</head>
<body>
	<!-- 루트 엘리먼트 : 시작 -->
	<div class="root-wrap mobile">
		<div id="tutorial">
			<div id="mateMobile" class="mobile">
				<section class="page-box cont on" data-step="1">
					<img src="./images/promotion/end_bg.png" class="size-100">
					<img src="./images/promotion/end_dim.png" class="size-100 step opacityAni1">
					<button type="button" class="btn-lottie">
						<img src="./images/promotion/end_btn.png" class="btn-img">
					</button>
					<img src="./images/promotion/end_bubble.png" class="balloon opacityAni2" style="transition: transform 0.8s linear;" data-bounce-id="null">
				</section>
				<section class="page-box cont url" data-step="2">
					<img src="./images/promotion/header.png" class="size-100 fixed">
					<img src="./images/promotion/result_img.png" class="size-100">
					<button type="button" class="btn-lottie" data-url="./promotion_gate.html">
						<img src="./images/promotion/home_btn.png" class="btn-img">
					</button>
				</section>
			</div>
		</div>
	</div>
	<!-- 루트 엘리먼트 : 끝 -->
	
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<script>
	document.addEventListener('DOMContentLoaded', () => {

	const sections = document.querySelectorAll('.cont');

	function goNext(section) {
		const nextSection = section.nextElementSibling;

		section.classList.remove('on');

		if (nextSection && nextSection.classList.contains('cont')) {
			nextSection.classList.add('on');
			handleSection(nextSection);
		}
	}

	/* 로티 실행 */
	function playLottie(section){
		const path = section.dataset.lottie;
		const container = section.querySelector('.lottie-container');
		if(!path || !container) return;
		container.innerHTML = '';
		lottie.loadAnimation({
		container: container,
		renderer: 'svg',
		loop: true,
		autoplay: true,
		path: path
		});
	}

	function handleSection(section) {
		playLottie(section);
		if (section.classList.contains('scroll')) {

			const img = section.querySelector('.scroll-inner-box img');

			if (img) {
				img.style.transition = 'top 1.5s ease 0.8s';
				img.style.top = '0';

				requestAnimationFrame(() => {
					img.style.top = '-79.3%';
				});
			}
		}

		const btns = section.querySelectorAll('.btn-lottie');

		if (btns.length > 0) {

		btns.forEach(btn => {

			btn.onclick = () => {

				// url 섹션이면 링크 이동
				if (section.classList.contains('url')) {

					const url = btn.dataset.url;

					if (url) {
						window.location.href = url;
					}

					return;
				}

				goNext(section);
			};

		});

		} else {

			setTimeout(() => {
				goNext(section);
			}, 3200);

		}
	}

	const firstSection = document.querySelector('.cont.on');
	if (firstSection) {
		handleSection(firstSection);
	}

	});
</script>
</body>
</html>
