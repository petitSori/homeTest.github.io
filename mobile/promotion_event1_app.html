<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta http-equiv="X-UA-Comaptible" content="IE=edge, chrome=1">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>메이트 체험하기_할인이벤트</title>

<link rel="stylesheet" href="./css/default.css" />
<link rel="stylesheet" href="./css/event1_app.css" />

</head>
<body>
	<!-- 루트 엘리먼트 : 시작 -->
	<div class="root-wrap mobile">
		<div id="tutorial">
			<div id="mateMobile" class="mobile">
				<section class="page-box cont on" data-step="1">
					<img src="./images/promotion/event1/step1.png" class="size-100">
					<img src="./images/promotion/event1/step1_dim.png" class="size-100 step opacityAni1">
					<button type="button" class="btn-lottie">
						<img src="./images/promotion/event1/step1_bubble.png" class="btn-img">
					</button>
				</section>

				<section class="page-box cont" data-step="2">
					<img src="./images/promotion/event1/step2.png" class="size-100">
					<div class="slide-img">
						<img src="./images/promotion/event1/slide_img.png" class="">
					</div>
				</section>

				<section class="page-box cont" data-step="3">
					<img src="./images/promotion/event1/step3.png" class="size-100">
					<img src="./images/promotion/event1/step1_dim.png" class="size-100 step opacityAni1">
					<button type="button" class="btn-lottie">
						<img src="./images/promotion/event1/step3_bubble.png" class="btn-img">
					</button>
				</section>

				<section class="page-box cont" data-step="4">
					<img src="./images/promotion/event1/step3.png" class="size-100">
					<img src="./images/promotion/event1/step3.png" class="size-100 opacityAni1">
					<img src="./images/promotion/event1/step3_check.png" class="size-100 step opacityAni2">
				</section>

				<section class="page-box cont scroll" data-step="5">
					<img src="./images/promotion/event1/scroll_bg.png" class="size-100 z-1">
					<div class="scroll-box">
						<div class="scroll-inner-box">
							<img src="./images/promotion/event1/scroll_img.png" class="size-100">
						</div>
					</div>
				</section>
				<section class="page-box cont" data-step="6">
					<img src="./images/promotion/event1/step6.png" class="size-100">
					<img src="./images/promotion/event1/step6_dim.png" class="size-100 step opacityAni1">
					<button type="button" class="btn-lottie">
						<img src="./images/promotion/event1/step6_bubble.png" class="btn-img">
					</button>
				</section>
				<section class="page-box cont" data-step="7">
					<img src="./images/promotion/event1/step6.png" class="size-100">
					<img src="./images/promotion/event1/step7_dim.png" class="size-100 step opacityAni1">
					<button type="button" class="btn-lottie">
						<img src="./images/promotion/event1/step7_btn.png" class="btn-img">
					</button>
					<img src="./images/promotion/event1/step7_bubble.png" class="balloon opacityAni2">
				</section>
				<section class="page-box cont url" data-step="8">
					<img src="./images/promotion/event1/step8.png" class="size-100">
					<img src="./images/promotion/event1/step7_dim.png" class="size-100 step opacityAni1">
					<button type="button" class="btn-lottie" data-url="../tablet/promotion_event1.html">
						<img src="./images/promotion/event1/step8_btn.png" class="btn-img">
					</button>
					<img src="./images/promotion/event1/step8_bubble.png" class="balloon opacityAni2">
				</section>
			</div>
		</div>
	</div>
	<!-- 루트 엘리먼트 : 끝 -->
	
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<script>
	document.addEventListener('DOMContentLoaded', () => {

	const sections = document.querySelectorAll('.cont');

	function goNext(section) {
		const nextSection = section.nextElementSibling;

		section.classList.remove('on');

		if (nextSection && nextSection.classList.contains('cont')) {
			nextSection.classList.add('on');
			handleSection(nextSection);
		}
	}

	/* 로티 실행 */
	function playLottie(section){
		const path = section.dataset.lottie;
		const container = section.querySelector('.lottie-container');
		if(!path || !container) return;
		container.innerHTML = '';
		lottie.loadAnimation({
		container: container,
		renderer: 'svg',
		loop: true,
		autoplay: true,
		path: path
		});
	}

	function handleSection(section) {
		playLottie(section);
		if (section.classList.contains('scroll')) {

			const img = section.querySelector('.scroll-inner-box img');

			if (img) {
				img.style.top = '0';

				setTimeout(() => {
					img.style.transition = 'top 2s ease';
					img.style.top = '-73.8%';
				});
			}
		}

		const btns = section.querySelectorAll('.btn-lottie');

		if (btns.length > 0) {

		btns.forEach(btn => {

			btn.onclick = () => {

				// url 섹션이면 링크 이동
				if (section.classList.contains('url')) {

					const url = btn.dataset.url;

					if (url) {
						window.location.href = url;
					}

					return;
				}

				goNext(section);
			};

		});

		} else {

			setTimeout(() => {
				goNext(section);
			}, 3200);

		}
	}

	const firstSection = document.querySelector('.cont.on');
	if (firstSection) {
		handleSection(firstSection);
	}

	});
</script>
</body>
</html>
